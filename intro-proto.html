<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>Intro Animation — Prototype (Rolodex)</title>

<!-- Leaflet (map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="anonymous" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="anonymous"></script>

<style>
  /* ---------- Fonts (shared with index.html) ---------- */
  @font-face {
    font-family: "Cooper Hewitt Light";
    src: url("fonts/CooperHewitt-Light.woff2") format("woff2"),
         url("fonts/CooperHewitt-Light.woff")  format("woff");
    font-weight: 100 900; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "Cooper Hewitt Semibold";
    src: url("fonts/CooperHewitt-Semibold.woff2") format("woff2"),
         url("fonts/CooperHewitt-Semibold.woff")  format("woff");
    font-weight: 100 900; font-style: normal; font-display: swap;
  }

  :root {
    --paper: #ffffff;
    --ink:   #7F9ABA;
    --line:  #7F9ABA;
    --rule:  rgba(127,154,186,.28);
    --barcode: #5b7aa8;
    --light: "Cooper Hewitt Light", system-ui, sans-serif;
    --main:  "Cooper Hewitt Semibold", system-ui, sans-serif;
    --bw: 1.5px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--light); color: var(--ink); background: var(--paper);
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  .stage { position: fixed; inset: 0; overflow: hidden; }

  .lbl {
    font-family: var(--light); font-weight: 600;
    text-transform: uppercase; letter-spacing: .18em;
    font-size: 11px; color: var(--ink);
  }

  /* ---------- ACT 1 — rolodex card deck, anchored to the top ---------- */
  #act-serial {
    position: absolute; inset: 0; z-index: 40;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding-top: calc(env(safe-area-inset-top) + clamp(48px, 12vh, 120px)); gap: 18px; background: var(--paper);
    transition: opacity .5s ease;
  }
  #act-serial.gone { opacity: 0; pointer-events: none; }
  .eyebrow { display: flex; gap: 10px; align-items: center; }
  .eyebrow .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ink); animation: pulse 1s infinite ease-in-out;
  }
  @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:1} }

  /* the deck holds a stack of cards; new cards drop down over the top of the old one */
  .deck {
    position: relative;
    width: min(86vw, 380px); height: clamp(158px, 46vw, 196px);
    perspective: 1000px; perspective-origin: center 30%;
  }
  .rcard {
    position: absolute; inset: 0;
    background: var(--paper);
    border: var(--bw) solid var(--line); border-radius: 7px;
    box-shadow: 0 12px 26px rgba(127,154,186,.24), 0 2px 0 rgba(127,154,186,.20);
    padding: 20px 22px 22px;
    display: flex; flex-direction: column;
    transform-origin: center top;
    will-change: transform;
  }
  /* a card resting flat on the deck */
  .rcard.rest { z-index: 1; }
  /* an incoming card: LOOMS large toward the camera (bigger than the page),
     then falls down and shrinks to fit the slot — opaque the whole way, so it
     covers the card beneath rather than dissolving into it. */
  .rcard.incoming {
    z-index: 5;
    transform: translateZ(360px) rotateX(15deg);
  }
  .rcard.incoming.land {
    transition: transform var(--dur, 200ms) cubic-bezier(.22,.72,.24,1);
    transform: translateZ(0) rotateX(0);
  }

  .rcard .top { display: flex; align-items: baseline; justify-content: space-between; }
  .rcard .top .mark { font-size: 10px; letter-spacing: .2em; }
  .rcard .rserial {
    font-family: var(--main); font-weight: 600;
    font-size: clamp(30px, 10vw, 46px); letter-spacing: .01em;
    font-variant-numeric: tabular-nums; color: var(--ink);
    margin: auto 0 0; line-height: 1;
  }
  .rcard .rbar { display: block; width: 72%; max-width: 220px; height: 26px; margin-top: 14px; fill: var(--barcode); }

  /* ---------- ACT 2 — map ---------- */
  #map {
    position: absolute; inset: 0; z-index: 10; background: #eef1f4;
    opacity: 0; transition: opacity .6s ease;
  }
  #map.show { opacity: 1; }
  .leaflet-container { background: #eef1f4; }

  /* ---------- ACT 3 — card ---------- */
  #card {
    position: absolute; left: 50%; top: 0; z-index: 30;
    width: min(92vw, 440px); transform: translate(-50%, -130%);
    background: var(--paper); border: var(--bw) solid var(--line);
    box-shadow: 0 24px 60px rgba(127,154,186,.35);
  }
  #card.drop { transition: transform 1.15s cubic-bezier(.16,.84,.28,1); transform: translate(-50%, 6vh); }
  .card-mast { padding: 20px 18px 14px; border-bottom: var(--bw) solid var(--line); }
  .card-brand {
    font-family: var(--main); font-weight: 600; text-transform: uppercase;
    letter-spacing: -.015em; font-size: clamp(26px, 8vw, 36px); line-height: .95; margin: 0;
  }
  .card-comp { display: flex; gap: 20px; margin-top: 11px; }
  .card-serial { padding: 16px 18px 20px; }
  .card-serial .no {
    font-family: var(--main); font-weight: 600; font-size: clamp(26px,8vw,38px);
    letter-spacing: -.01em; font-variant-numeric: tabular-nums; margin: 8px 0 0;
  }
  .card-serial svg { display: block; width: 66%; max-width: 240px; height: 30px; margin-top: 12px; fill: var(--barcode); }

  /* ---------- dev controls ---------- */
  .dev { position: fixed; z-index: 100; bottom: 14px; right: 14px; display: flex; gap: 8px; }
  .dev button {
    font-family: var(--light); font-weight: 600; text-transform: uppercase;
    letter-spacing: .12em; font-size: 10px; color: var(--ink);
    background: var(--paper); border: var(--bw) solid var(--line);
    padding: 8px 12px; border-radius: 4px; cursor: pointer;
  }
  .dev button:active { background: #f2f5f8; }
</style>
</head>
<body>
  <div class="stage">
    <!-- ACT 2 map sits behind everything -->
    <div id="map"></div>

    <!-- ACT 1 rolodex -->
    <div id="act-serial">
      <div class="deck" id="deck"></div>
      <div class="eyebrow">
        <span class="dot"></span>
        <span class="lbl" id="status">Locating board</span>
      </div>
    </div>

    <!-- ACT 3 card -->
    <div id="card">
      <div class="card-mast">
        <h1 class="card-brand">Hybrid Construction</h1>
        <div class="card-comp">
          <span class="lbl">22% Upcycled</span>
          <span class="lbl">78% New Growth</span>
        </div>
      </div>
      <div class="card-serial">
        <span class="lbl">Board Serial No.</span>
        <div class="no" id="card-no">18294-28-286</div>
        <svg id="card-barcode" viewBox="0 0 320 40" preserveAspectRatio="none" aria-hidden="true"></svg>
      </div>
    </div>
  </div>

  <div class="dev"><button id="replay">Replay</button></div>

<script>
  const SERIAL = "18294-28-286";
  const SITE = [36.9642, -122.0189];
  const US   = [39.5, -98.35];

  const deck    = document.getElementById('deck');
  const status  = document.getElementById('status');
  const actSerial = document.getElementById('act-serial');
  const mapEl   = document.getElementById('map');
  const card    = document.getElementById('card');

  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const rnd = arr => arr[Math.floor(Math.random() * arr.length)];

  function randSerial() {
    const d = n => Array.from({length:n}, () => Math.floor(Math.random()*10)).join('');
    return `${d(5)}-${d(2)}-${d(3)}`;
  }
  function barcodeSVG() {
    let x = 0, bar = true, out = '';
    while (x < 320) {
      const bw = rnd([2,3,5]);
      if (bar) out += `<rect x="${x}" y="0" width="${Math.max(1,bw-0.6)}" height="40"/>`;
      x += bw; bar = !bar;
    }
    return out;
  }
  function cardHTML(serial) {
    return `<div class="top"><span class="lbl mark">No.</span><span class="lbl mark">Hybrid</span></div>
            <div class="rserial">${serial}</div>
            <svg class="rbar" viewBox="0 0 320 40" preserveAspectRatio="none" aria-hidden="true">${barcodeSVG()}</svg>`;
  }
  function makeCard(serial, cls) {
    const c = document.createElement('div');
    c.className = 'rcard ' + cls;
    c.innerHTML = cardHTML(serial);
    return c;
  }

  /* a new card folds DOWN from the top edge, covering the card beneath (no fade) */
  let current;
  function flipIn(next, dur) {
    return new Promise(res => {
      const nc = makeCard(next, 'incoming');
      nc.style.setProperty('--dur', dur + 'ms');
      deck.appendChild(nc);
      requestAnimationFrame(() => requestAnimationFrame(() => nc.classList.add('land')));
      setTimeout(() => {
        if (current && current.parentNode) current.remove();  // old card is fully covered — retire it
        nc.classList.remove('incoming', 'land');
        nc.classList.add('rest');
        current = nc;
        res();
      }, dur);
    });
  }

  /* thumb through random cards, decelerating, and land on the scanned serial */
  async function runRolodex() {
    deck.innerHTML = '';
    current = makeCard(randSerial(), 'rest');
    deck.appendChild(current);

    const queue = [];
    const SPINS = 16;
    for (let i = 0; i < SPINS; i++) queue.push(randSerial());
    queue.push(SERIAL);

    for (let i = 0; i < queue.length; i++) {
      const t = i / (queue.length - 1);            // 0 → 1
      const dur = 105 + 340 * Math.pow(t, 2.4);    // ease-in slowdown
      await flipIn(queue[i], dur);
      if (i < queue.length - 1) await sleep(dur * 0.10);
    }
    status.textContent = 'Board located';
    await sleep(700);
  }

  /* ---------- map act ---------- */
  let map;
  function makeMap() {
    if (map) { map.remove(); map = null; }
    mapEl.innerHTML = '';
    map = L.map('map', {
      zoomControl: false, attributionControl: false,
      dragging: false, scrollWheelZoom: false, doubleClickZoom: false,
      touchZoom: false, boxZoom: false, keyboard: false,
    }).setView(US, 4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
    const pin = L.divIcon({
      className: 'tag-pin',
      html: '<div style="width:18px;height:18px;background:#db951d;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 6px rgba(91,122,168,.5)"></div>',
      iconSize: [18,18], iconAnchor: [9,18],
    });
    L.marker(SITE, {icon: pin}).addTo(map);
  }
  function flyToSite() {
    return new Promise(resolve => {
      map.once('moveend', () => resolve());
      map.flyTo(SITE, 15, { duration: 3.0, easeLinearity: 0.22 });
      setTimeout(resolve, 3400);
    });
  }

  function drawCardBarcode() {
    document.getElementById('card-barcode').innerHTML = barcodeSVG();
  }

  /* ---------- full sequence ---------- */
  async function play() {
    actSerial.classList.remove('gone');
    mapEl.classList.remove('show');
    card.classList.remove('drop');
    status.textContent = 'Locating board';
    drawCardBarcode();
    makeMap();

    await runRolodex();                 // ACT 1

    mapEl.classList.add('show');        // ACT 2
    actSerial.classList.add('gone');
    await sleep(400);
    map.invalidateSize();
    await flyToSite();

    await sleep(150);                   // ACT 3
    card.classList.add('drop');
  }

  document.getElementById('replay').addEventListener('click', play);
  window.addEventListener('load', play);
</script>
</body>
</html>
